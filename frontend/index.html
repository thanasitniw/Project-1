<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private ASN Manager</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div class="headline-block">
          <p class="eyebrow">IPCORE NETWORK</p>
          <h1>Private ASN Manager</h1>
          <p class="subtitle"><span id="pool-label">2-byte pool: 64512-65534</span></p>
        </div>

        <div class="header-actions">
          <div class="segmented-control">
            <button class="segment is-active" data-pool="2-byte">2-byte</button>
            <button class="segment" data-pool="4-byte">4-byte</button>
          </div>
          <button class="assign-button">+ Assign new ASN ↗</button>
        </div>
      </header>

      <section class="summary-grid" id="stats-grid"></section>

      <section class="assignment-section">
        <div class="section-header">
          <h2>ASN assignments</h2>

          <div class="filters-row">
            <label class="search-box">
              <span class="visually-hidden">Search</span>
              <input id="search-input" type="search" placeholder="Search site, hostname" />
            </label>

            <select class="select-box" id="status-filter">
              <option value="all">All status</option>
              <option value="Assigned">Assigned</option>
              <option value="Reserved">Reserved</option>
              <option value="Decom">Decom</option>
            </select>

            <select class="select-box" id="type-filter">
              <option value="all">All type</option>
              <option value="iBGP">iBGP</option>
              <option value="eBGP">eBGP</option>
              <option value="MPLS">MPLS</option>
            </select>
          </div>
        </div>

        <div class="table-panel">
          <table>
            <thead>
              <tr>
                <th>ASN</th>
                <th>Site / PoP</th>
                <th>Region</th>
                <th>Router Hostname</th>
                <th>Type</th>
                <th>Status</th>
                <th>Assigned</th>
              </tr>
            </thead>
            <tbody id="asn-table-body"></tbody>
          </table>
        </div>
      </section>

      <section class="utilization-panel">
        <div class="utilization-header">
          <h2>Pool utilization</h2>
          <p id="utilization-text">0 / 0 used (0%)</p>
        </div>
        <div class="utilization-bar">
          <span class="utilization-fill" id="utilization-fill"></span>
        </div>
      </section>

      <section class="footer-note">
        <p id="status-text">Checking backend...</p>
      </section>
    </main>
  </body>
</html>
