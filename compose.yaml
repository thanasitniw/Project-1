name: asn-web

services:
  app:
    image: asn-web-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: asn-web-app
    ports:
      - "8000:8000"
    environment:
      ASN_DATA_FILE: /app/data/asn_store.json
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
