name: asn-web

services:
  app:
    image: asn-web-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: asn-web-app
    environment:
      ASN_SOURCE_DIR: /asn-source
    ports:
      - "8000:8000"
    volumes:
      - ${HOST_ASN_DATA_DIR:-/Users/ta/Documents/ASN}:/asn-source:ro
    restart: unless-stopped
